name: nexus

x-app-environment: &app-environment
  DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-nexus}
  DATABASE_SSL: "false"
  REDIS_URL: redis://redis:6379
  AUTH_HASH_SECRET: ${AUTH_HASH_SECRET:?Set AUTH_HASH_SECRET}
  AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-true}
  AUTH_CREDENTIAL_KEY_ID: ${AUTH_CREDENTIAL_KEY_ID:-}
  AUTH_CREDENTIAL_PRIVATE_KEY_FILE: /run/secrets/auth-credential-private.pem
  OBJECT_STORAGE_DRIVER: local
  OBJECT_STORAGE_LOCAL_DIR: /app/server/data/uploads

services:
  postgres:
    image: ${POSTGRES_IMAGE:-postgres:16-alpine}
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexus}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: ${REDIS_IMAGE:-redis:7-alpine}
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - redis_data:/data

  migrate:
    build:
      context: .
      target: migration
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    environment:
      <<: *app-environment
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  web:
    build:
      context: .
      target: runner
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NEXT_PUBLIC_COLLABORATION_URL: ${NEXT_PUBLIC_COLLABORATION_URL:-ws://localhost:1234}
    restart: unless-stopped
    init: true
    environment:
      <<: *app-environment
      AUTH_MAIL_CAPTURE_FILE: ${AUTH_MAIL_CAPTURE_FILE:-}
      AUTH_MAIL_CAPTURE_ALLOW_PRODUCTION: ${AUTH_MAIL_CAPTURE_ALLOW_PRODUCTION:-false}
      APP_URL: ${APP_URL:-http://localhost:3000}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      NEXT_PUBLIC_COLLABORATION_URL: ${NEXT_PUBLIC_COLLABORATION_URL:-ws://localhost:1234}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s
    volumes:
      - uploads_data:/app/server/data/uploads
      - ${AUTH_CREDENTIAL_PRIVATE_KEY_HOST_FILE:-.secrets/auth-credential-private.pem}:/run/secrets/auth-credential-private.pem:ro

  collaboration:
    build:
      context: .
      target: collaboration
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
    restart: unless-stopped
    init: true
    environment:
      <<: *app-environment
      COLLAB_ALLOWED_ORIGINS: ${COLLAB_ALLOWED_ORIGINS:-http://localhost:3000}
      COLLAB_HOST: 0.0.0.0
      COLLAB_PORT: 1234
      COLLAB_YJS_COMPACTION_BYTES: ${COLLAB_YJS_COMPACTION_BYTES:-1048576}
      COLLAB_YJS_COMPACTION_UPDATES: ${COLLAB_YJS_COMPACTION_UPDATES:-100}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${COLLAB_EXTERNAL_PORT:-1234}:1234"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:1234').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 10s

volumes:
  postgres_data:
  redis_data:
  uploads_data:
